<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Tạp Hóa GenZ - Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/storefront.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-store-alt"></i> Cửa Hàng Tiện Lợi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active fw-bold" href="#">Trang Chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sản Phẩm Mới</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="gio-hang.html" class="btn btn-outline-dark rounded-pill me-3 px-4 position-relative">
                        <i class="fas fa-shopping-cart text-success me-1"></i> Giỏ hàng
                        <span class="badge bg-danger rounded-pill cart-badge" id="cartCount">0</span>
                    </a>
                    
                    <div class="dropdown">
                        <button class="btn btn-success rounded-pill px-4 dropdown-toggle fw-bold" type="button" id="userDropdown" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i> <span id="lblTenKhachHang">Khách</span>
                        </button>
                        
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" href="#">
                                    <i class="fas fa-history text-secondary"></i> Lịch sử mua hàng
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger" href="javascript:void(0)" onclick="dangXuatKhach()">
                                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-4">
        <div class="p-5 rounded-3" style="background: linear-gradient(135deg, rgba(46, 204, 113, 0.1) 0%, rgba(46, 204, 113, 0.3) 100%); border: 1px dashed var(--primary-green);">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h2 class="fw-bold text-success">Ưu đãi mùa hè rực rỡ!</h2>
                    <p class="fs-5 text-muted">Mua sắm trực tuyến nhanh chóng, tiện lợi. Nhận ngay 10 điểm thưởng cho mỗi đơn hàng.</p>
                </div>
                <div class="col-md-4 text-end">
                    <i class="fas fa-tags text-success opacity-50" style="font-size: 5rem;"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row g-4">
            
            <div class="col-md-3">
                <div class="card category-card">
                    <div class="card-header py-3">
                        <i class="fas fa-bars me-2"></i> Danh Mục Sản Phẩm
                    </div>
                    <div class="list-group list-group-flush category-list" id="listLoaiSP">
                        </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="row row-cols-1 row-cols-md-3 g-4" id="gridSanPham">
                    </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/frontend/js/trang-mua-sam.js"></script>
    <script src="/frontend/js/auth.js"></script>
</body>
</html>
