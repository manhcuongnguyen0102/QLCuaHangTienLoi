<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Cửa Hàng Tiện Lợi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/mua-sap.css">
    <link rel="stylesheet" href="/frontend/css/gio-hang.css">
</head>
<body>
<header class="main-header">
    <div class="header-content container">
        <div class="logo-area">
            <i class="fas fa-store logo-icon"></i>
            <span class="logo-text">Cửa Hàng Tiện Lợi</span>
        </div>
        <nav class="main-nav">
            <a href="mua-sap.html" class="nav-item">Tiếp tục mua hàng</a>
        </nav>
        <div class="user-actions">
            <a href="gio-hang.html" class="cart-link">
                <i class="fas fa-shopping-cart"></i> Giỏ hàng
                <span class="cart-count">0</span>
            </a>
            <div class="user-dropdown">
                <button class="user-btn">
                    <i class="fas fa-user-circle"></i> <span id="user-name-display">khách</span> <i class="fas fa-caret-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="#" onclick="logout()">Đăng xuất</a>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="cart-container">
    <div class="cart-header">
        <h2><i class="fas fa-shopping-cart"></i> Giỏ hàng <span id="cart-item-count">(0 sản phẩm)</span></h2>
    </div>
    <div id="cart-content">
        <!-- Nội dung sẽ được render bằng JS -->
    </div>
</div>

<script src="/frontend/js/gio-hang.js"></script>
<script src="/frontend/js/auth.js"></script>
</body>
</html>
