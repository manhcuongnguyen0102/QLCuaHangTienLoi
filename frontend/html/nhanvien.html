<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Nhân Viên (Dành Cho Admin)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/dashboard.css">
</head>
<body>

    <div id="sidebar">
        <div class="logo-area"><i class="fas fa-store"></i><h3>Admin Panel</h3></div>
        <nav class="nav flex-column mb-auto" id="adminMenu">
            <a href="index.html" class="nav-link"><i class="fas fa-chart-pie"></i> Bảng Điều Khiển</a>
            <a href="quanlydonhang.html" class="nav-link"><i class="fas fa-shopping-cart"></i>Quản Lý Đơn Hàng</a>
            <a href="danhMucSP.html" class="nav-link"><i class="fas fa-box-open"></i> Danh Mục Sản Phẩm</a>
            <a href="nhapkho.html" class="nav-link"><i class="fas fa-truck-loading"></i> Nhập Kho</a>
            <a href="khachhang.html" class="nav-link"><i class="fas fa-users"></i> Khách Hàng</a>
            <a href="nhanvien.html" class="nav-link "><i class="fas fa-user-tie"></i> Quản Lý Nhân Viên</a>
        </nav>
        
        <div class="user-area mt-auto pt-3 border-top border-light border-opacity-25 text-center">
            <div class="mb-2 text-white">
                <i class="fas fa-user-circle fs-4 mb-1"></i>
                <div class="fw-bold" id="lblTenNhanVien">Đang tải...</div>
            </div>
            <button class="btn btn-outline-light btn-sm w-100" onclick="dangXuat()">
                <i class="fas fa-sign-out-alt"></i> Đăng xuất
            </button>
        </div>
    </div>

    <div id="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold text-dark"><i class="fas fa-user-shield"></i> Danh Sách Nhân Sự</h4>
            <button class="btn btn-primary" onclick="moFormThem()"><i class="fas fa-user-plus"></i> Thêm Nhân Viên Mới</button>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="search-box" style="width: 300px;">
                <input type="text" id="searchInput" class="form-control" placeholder="Nhập từ khóa tìm kiếm...">
            </div>
        </div>
        <div class="dashboard-panel">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Mã NV</th>
                        <th>Họ Tên</th>
                        <th>Chức Vụ</th>
                        <th>Điện Thoại</th>
                        <th>Tên Đăng Nhập</th>
                        <th>Trạng Thái</th> <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody id="bangNhanVien">
                    </tbody>
            </table>
            <div id="pagination-container" class="pagination-area mt-4 d-flex justify-content-end">
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNhanVien" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Thông Tin Nhân Viên</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formNhanVien">
                        <input type="hidden" id="txtMaNV">
                        
                        <div class="mb-3">
                            <label class="form-label">Họ và Tên</label>
                            <input type="text" id="txtTenNV" class="form-control" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label">Chức Vụ</label>
                                <select id="selChucVu" class="form-select">
                                    <option value="Nhân viên bán hàng">Nhân viên bán hàng</option>
                                    <option value="Thủ kho">Thủ kho</option>
                                    <option value="Quản lý">Quản lý</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Số Điện Thoại</label>
                                <input type="text" id="txtSDT" class="form-control" required>
                            </div>
                        </div>
                        <hr>
                        <h6 class="text-primary fw-bold">Thông tin tài khoản</h6>
                        <div class="mb-3">
                            <label class="form-label">Tên Đăng Nhập (Username)</label>
                            <input type="text" id="txtUsername" class="form-control" required>
                        </div>
                        <div class="mb-3" id="khungMatKhau">
                            <label class="form-label">Mật Khẩu</label>
                            <input type="password" id="txtPassword" class="form-control">
                            <small class="text-danger">* Lưu ý: Cấp mật khẩu mặc định cho nhân viên mới</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="luuNhanVien()"><i class="fas fa-save"></i> Lưu Lại</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script src="/frontend/js/nhanvien.js"></script>
</body>
</html>
