<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh Mục Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/dashboard.css">
</head>
<body>
    <div id="sidebar">
        <div class="logo-area"><i class="fas fa-store"></i><h3>Admin Panel</h3></div>
        <nav class="nav flex-column mb-auto">
            <a href="index.html" class="nav-link"><i class="fas fa-chart-pie"></i> Bảng Điều Khiển</a>
            <a href="quanlydonhang.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Quản Lý Đơn Hàng</a>
            <a href="danhMucSP.html" class="nav-link active"><i class="fas fa-box-open"></i> Danh Mục Sản Phẩm</a>
            <a href="nhapkho.html" class="nav-link"><i class="fas fa-truck-loading"></i> Nhập Kho</a>
            <a href="khachhang.html" class="nav-link"><i class="fas fa-users"></i> Khách Hàng</a>
             <a href="nhanvien.html" class="nav-link "><i class="fas fa-user-tie"></i> Quản Lý Nhân Viên</a>
        </nav>
         <!--<div class="user-area">
            <button class="btn btn-outline-light btn-sm w-100" onclick="dangXuat()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
        </div>-->
        <div class="user-area mt-auto pt-3 border-top border-light border-opacity-25 text-center">
            <div class="mb-2 text-white">
                <i class="fas fa-user-circle fs-4 mb-1"></i>
                <div class="fw-bold" id="lblTenNhanVien">Đang tải...</div>
            </div>
            <button class="btn btn-outline-light btn-sm w-100" onclick="dangXuat()">
                <i class="fas fa-sign-out-alt"></i> Đăng xuất
            </button>
        </div>
    </div>

    <div id="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold text-dark"><i class="fas fa-box"></i> Quản Lý Sản Phẩm</h4>
            <button class="btn btn-primary" onclick="moFormThem()"><i class="fas fa-plus"></i> Thêm Sản Phẩm Mới</button>
        </div>

        <div class="dashboard-panel">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Mã SP</th>
                        <th>Tên Sản Phẩm</th>
                        <th>Loại / NCC</th>
                        <th>Giá Nhập</th>
                        <th>Giá Bán</th>
                        <th>Tồn Kho</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody id="bangSanPham">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalSanPham" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Thêm Sản Phẩm</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formSanPham">
                        <input type="hidden" id="txtMaSP">
                        
                        <div class="mb-3">
                            <label class="form-label">Tên Sản Phẩm</label>
                            <input type="text" id="txtTenSP" class="form-control" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label">Giá Nhập</label>
                                <input type="number" id="txtGiaNhap" class="form-control" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Giá Bán</label>
                                <input type="number" id="txtGiaBan" class="form-control" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label">Loại Sản Phẩm</label>
                                <select id="txtMaLoai" class="form-select" required></select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Nhà Cung Cấp</label>
                                <select id="txtMaNCC" class="form-select" required></select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="luuSanPham()">Lưu Lại</button>
                </div>
            </div>
        </div>
        <div class="user-area mt-auto pt-3 border-top border-light border-opacity-25 text-center">
            <div class="mb-2 text-white">
                <i class="fas fa-user-circle fs-4 mb-1"></i>
                <div class="fw-bold" id="lblTenNhanVien">Đang tải...</div>
            </div>
            <button class="btn btn-outline-light btn-sm w-100" onclick="dangXuat()">
                <i class="fas fa-sign-out-alt"></i> Đăng xuất
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/frontend/js/danhMucSP.js"></script>
    <script src="/frontend/js/auth.js"></script>
</body>
</html>
