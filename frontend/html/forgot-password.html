<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu | Cửa Hàng Tiện Lợi</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/login.css">
</head>
<body>

    <div class="split-screen">
        <div class="left-pane">
            <i class="fas fa-key main-icon"></i>
            <h1>Khôi Phục Nhanh</h1>
            <p>Chỉ cần nhập số điện thoại đã đăng ký để thiết lập lại mật khẩu mới ngay lập tức.</p>
        </div>

        <div class="right-pane">
            <div class="login-container">
                <div class="login-header">
                    <h2>Quên mật khẩu?</h2>
                    <p>Xác thực qua số điện thoại</p>
                </div>

                <div id="messageBox" class="message-box" style="display: none;"></div>

                        <form id="forgotPasswordForm">
                <div class="input-group" id="phoneSection">
                    <label for="recovery-sdt">Số điện thoại đăng ký</label>
                    <div class="input-with-icon">
                        <i class="fas fa-phone icon"></i>
                        <input type="number" id="recovery-sdt" required placeholder="Nhập số điện thoại">
                    </div>
                </div>

                <div id="passwordSection" style="display: none; margin-top: 15px;">
                    <div class="input-group">
                        <label for="new-password">Mật khẩu mới</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock icon"></i>
                            <input type="password" id="new-password" placeholder="Nhập mật khẩu mới">
                        </div>
                    </div>
                </div>

                <button type="submit" id="recoveryBtn" style="margin-top: 20px; background-color: #28a745;">Xác minh</button>

                <div class="divider"><span>hoặc</span></div>
                <button type="button" class="btn-secondary" onclick="window.location.href='login.html'">Quay lại</button>
            </form>
                        </div>
                    </div>
                </div>

    <script src="/frontend/js/forgot-password.js" defer></script>
</body>
</html>
