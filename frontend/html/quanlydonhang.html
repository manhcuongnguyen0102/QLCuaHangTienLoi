<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/dashboard.css">
</head>
<body>

    <div id="sidebar">
        <div class="logo-area">
            <i class="fas fa-store"></i>
            <h3>Admin Panel</h3>
        </div>
        <nav class="nav flex-column mb-auto">
            <a href="index.html" class="nav-link"><i class="fas fa-chart-pie"></i> Bảng Điều Khiển</a>
            <a href="quanlydonhang.html" class="nav-link active"><i class="fas fa-shopping-cart"></i> Quản Lý Đơn Hàng</a>
            <a href="danhMucSP.html" class="nav-link"><i class="fas fa-box-open"></i> Danh Mục Sản Phẩm</a>
            <a href="nhapkho.html" class="nav-link"><i class="fas fa-truck-loading"></i> Nhập Kho</a>
            <a href="khachhang.html" class="nav-link"><i class="fas fa-users"></i> Khách Hàng</a>
             <a href="nhanvien.html" class="nav-link "><i class="fas fa-user-tie"></i> Quản Lý Nhân Viên</a>
        </nav>
        <!--<div class="user-area">
            <button class="btn btn-outline-light btn-sm w-100" onclick="dangXuat()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
        </div>-->
        <div class="user-area mt-auto pt-3 border-top border-light border-opacity-25 text-center">
            <div class="mb-2 text-white">
                <i class="fas fa-user-circle fs-4 mb-1"></i>
                <div class="fw-bold" id="lblTenNhanVien">Đang tải...</div>
            </div>
            <button class="btn btn-outline-light btn-sm w-100" onclick="dangXuat()">
                <i class="fas fa-sign-out-alt"></i> Đăng xuất
            </button>
        </div>
    </div>

    <div id="main-content">
        <h4 class="mb-4 fw-bold text-dark"><i class="fas fa-file-invoice-dollar"></i> Danh Sách Hóa Đơn</h4>
        
        <div class="dashboard-panel">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Mã HĐ</th>
                        <th>Ngày Lập</th>
                        <th>Khách Hàng</th>
                        <th>Thu Ngân</th>
                        <th>Tổng Tiền</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="bangHoaDon">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalChiTiet" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="fas fa-receipt"></i> Chi Tiết Hóa Đơn: <span id="modalMaHD"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <table class="table table-bordered text-center">
                        <thead class="table-light">
                            <tr>
                                <th>Mã Sản Phẩm</th>
                                <th>Số Lượng</th>
                                <th>Đơn Giá</th>
                                <th>Thành Tiền</th>
                            </tr>
                        </thead>
                        <tbody id="bangChiTietHD">
                            </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="3" class="text-end fw-bold">Tổng cộng:</td>
                                <td class="text-danger fw-bold fs-5" id="modalTongTien">0 ₫</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/frontend/js/quanlydonhang.js"></script>
    <script src="/frontend/js/auth.js"></script>
</body>
</html>
